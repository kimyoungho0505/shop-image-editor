# 카테고리/촬영각도/촬영유형 조합별 그림자 프롬프트 보충 지시
# ─────────────────────────────────────────────────────
# 키 형식: {category}/{shooting_angle}/{image_type}
# 조회 우선순위 (가장 구체적인 것 우선):
#   1. category/angle/type  (예: hat/high_angle/full)
#   2. category/angle       (예: hat/high_angle)
#   3. category             (예: hat)
#   4. angle/type           (예: high_angle/full)
#   5. angle                (예: high_angle)
#   6. type                 (예: full)
#   7. default
#
# main_prompt(공통 규칙) + 매칭된 hint(조건별 보충) = 최종 프롬프트
# 자동수정 시 해당 키의 hint만 수정되므로 다른 상품에 영향 없음
# ─────────────────────────────────────────────────────

# ══════════════════════════════════════
# 기본 (모든 조합에서 매칭 안 될 때 폴백)
# ══════════════════════════════════════
default: >
  제품이 바닥에 자연스럽게 놓여있는 접지 그림자(contact shadow)를 생성하세요.
  그림자는 제품이 바닥과 실제로 맞닿는 접지면에서만 시작하여 부드럽게 퍼져야 합니다.

# ══════════════════════════════════════
# 촬영방향별 폴백 (카테고리 매칭 안 될 때)
# ══════════════════════════════════════
front: >
  정면에서 촬영된 제품입니다. 바닥 접지면 전체를 따라 자연스러운 그림자를 생성하세요.

high_angle: >
  위에서 비스듬히 내려다본 촬영입니다.
  그림자는 제품이 바닥에 닿는 접지면에만 아주 얇게 생성하세요.
  카메라가 위에 있으므로 그림자가 뒤쪽으로 길게 뻗지 않아야 합니다.

top_down: >
  위에서 수직으로 내려다본 탑다운 촬영입니다.
  접지 그림자가 거의 보이지 않는 각도이므로 그림자를 극히 미세하게만 생성하세요.

side: >
  측면에서 촬영된 이미지입니다.
  그림자는 바닥 접지면에서 카메라 반대쪽으로 자연스럽게 드리워야 합니다.

detail: >
  디테일/클로즈업 촬영입니다. 제품 일부만 보이므로 그림자는 최소한으로 생성하세요.
  접지면이 보이지 않을 수 있으므로 무리하게 그림자를 추가하지 마세요.

held: >
  손으로 잡고 있는 촬영입니다. 바닥에 놓인 것이 아니므로 그림자를 생성하지 마세요.

worn: >
  모델/마네킹 착용 촬영입니다. 발이 보이는 경우에만 바닥 접지 그림자를 생성하세요.
  상반신만 보이는 경우 그림자를 생성하지 마세요.

package: >
  패키지/박스 촬영입니다. 바닥에 놓인 박스의 접지면을 따라 자연스러운 그림자를 생성하세요.

# ══════════════════════════════════════
# 가방 (bag)
# ══════════════════════════════════════
bag: >
  가방 제품입니다. 가방 바닥면이 바닥에 닿는 접지면을 따라 그림자를 생성하세요.
  끈이나 핸들이 위로 올라간 부분에는 그림자를 만들지 마세요.

bag/front: >
  가방 정면 촬영입니다. 가방 바닥 전체가 바닥에 닿아 있으므로
  바닥면 윤곽을 따라 부드러운 접지 그림자를 생성하세요.
  핸들/스트랩이 위로 올라간 부분에는 그림자를 만들지 마세요.

bag/high_angle: >
  가방을 위에서 비스듬히 내려다본 촬영입니다.
  카메라가 위에 있으므로 그림자가 길게 뻗지 않고 바닥 접지면에만 얇게 생성하세요.
  가방 윗면이 보이는 각도이므로 그림자는 최소한으로 유지하세요.

bag/side: >
  가방 측면 촬영입니다. 가방 바닥면에서 카메라 반대쪽으로
  자연스럽게 드리우는 그림자를 생성하세요.

bag/detail: >
  가방 디테일 촬영(로고, 버클, 내부, 스티칭 등)입니다.
  제품 전체가 보이지 않으므로 그림자는 생성하지 않거나 극히 미세하게만 생성하세요.

bag/top_down: >
  가방을 위에서 수직으로 내려다본 탑다운 촬영입니다.
  바닥 접지면이 보이지 않는 각도이므로 그림자를 극히 미세하게만 생성하세요.

# ══════════════════════════════════════
# 신발 (shoes)
# ══════════════════════════════════════
shoes: >
  신발 제품입니다. 밑창(sole) 전체가 바닥에 닿으므로 밑창 윤곽을 따라 그림자를 생성하세요.

shoes/front: >
  신발 정면 촬영입니다. 밑창 전체가 바닥에 닿아 있으므로
  밑창 윤곽을 따라 자연스러운 접지 그림자를 생성하세요.
  신발 옆면 위쪽에는 그림자가 생기지 않아야 합니다.

shoes/side: >
  신발 측면 촬영입니다. 밑창이 바닥에 닿는 선을 따라 그림자를 생성하세요.
  발등 위쪽으로는 그림자가 올라가지 않아야 합니다.

shoes/high_angle: >
  신발을 위에서 비스듬히 내려다본 촬영입니다.
  밑창 접지면에만 얇은 그림자를 생성하세요. 위에서 내려다보는 시점이므로
  그림자가 뒤쪽으로 길게 뻗지 않아야 합니다.

shoes/detail: >
  신발 디테일 촬영(로고, 솔, 스티칭, 내부 등)입니다.
  제품 일부만 보이므로 그림자는 생성하지 않거나 극히 미세하게만 생성하세요.

shoes/top_down: >
  신발을 위에서 수직으로 내려다본 탑다운 촬영입니다.
  밑창이 바닥에 닿아 있지만 위에서 보는 각도이므로 그림자를 거의 보이지 않게 생성하세요.

# ══════════════════════════════════════
# 모자 (hat)
# ══════════════════════════════════════
hat: >
  모자 제품입니다. 모자 챙(brim)의 곡선을 따라 자연스러운 접지 그림자를 생성하세요.
  챙 끝이 바닥에 닿지 않는 부분에는 그림자를 만들지 마세요.

hat/front: >
  모자 정면 촬영입니다. 챙(brim)의 곡선이 바닥에 닿는 접지면을 따라 그림자를 생성하세요.
  모자 크라운(crown) 상단부에는 그림자를 만들지 마세요.

hat/high_angle: >
  모자를 위에서 비스듬히 내려다본 촬영입니다.
  챙의 접지면에만 아주 얇은 그림자를 생성하세요.
  위에서 보는 각도이므로 챙 뒤쪽으로 그림자가 길게 뻗지 않아야 합니다.

hat/side: >
  모자 측면 촬영입니다. 챙과 크라운 하단이 바닥에 닿는 부분을 따라
  카메라 반대쪽으로 자연스러운 그림자를 생성하세요.

hat/detail: >
  모자 디테일 촬영(로고, 자수, 내부 라벨 등)입니다.
  제품 일부만 보이므로 그림자는 생성하지 마세요.

hat/top_down: >
  모자를 위에서 수직으로 내려다본 탑다운 촬영입니다.
  접지 그림자가 거의 보이지 않는 각도이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 의류 (clothing)
# ══════════════════════════════════════
clothing: >
  의류 제품입니다. 옷이 바닥에 놓인 경우 접힌 부분의 접지면을 따라 그림자를 생성하세요.
  마네킹이나 옷걸이에 걸린 경우 하단 끝부분에만 미세한 그림자를 생성하세요.

clothing/front: >
  의류 정면 촬영입니다. 옷 하단이 바닥에 닿는 부분을 따라
  부드러운 접지 그림자를 생성하세요.

clothing/worn: >
  의류 착용 촬영(모델/마네킹)입니다. 발이 보이는 전신샷인 경우에만
  발 아래 바닥에 접지 그림자를 생성하세요. 상반신만 보이면 그림자를 생성하지 마세요.

clothing/detail: >
  의류 디테일 촬영(로고, 지퍼, 단추, 소재 질감 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

clothing/top_down: >
  의류를 바닥에 펼쳐놓고 위에서 수직으로 촬영한 플랫레이입니다.
  그림자가 거의 보이지 않는 각도이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 시계 (watch)
# ══════════════════════════════════════
watch: >
  시계 제품입니다. 시계 케이스 하단과 밴드가 바닥에 닿는 접지면을 따라 그림자를 생성하세요.

watch/front: >
  시계 정면 촬영입니다. 케이스 하단과 밴드 접지면을 따라 그림자를 생성하세요.
  시계 유리면 반사는 그림자가 아니므로 추가하지 마세요.

watch/detail: >
  시계 디테일 촬영(다이얼, 무브먼트, 크라운 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

watch/side: >
  시계 측면 촬영입니다. 케이스 측면과 밴드가 바닥에 닿는 부분을 따라
  자연스러운 그림자를 생성하세요.

# ══════════════════════════════════════
# 주얼리 (jewelry)
# ══════════════════════════════════════
jewelry: >
  주얼리 제품입니다. 매우 작은 제품이므로 극히 미세한 접지 그림자만 생성하세요.
  반지, 목걸이 등 형태에 맞는 자연스러운 그림자를 만드세요.

jewelry/front: >
  주얼리 정면 촬영입니다. 바닥에 닿는 접지점에만 극히 미세한 그림자를 생성하세요.

jewelry/detail: >
  주얼리 디테일 촬영(세공, 보석, 각인 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 지갑 (wallet)
# ══════════════════════════════════════
wallet: >
  지갑 제품입니다. 납작한 형태이므로 바닥 접지면 전체에 얇고 균일한 그림자를 생성하세요.

wallet/front: >
  지갑 정면 촬영입니다. 바닥면 전체가 닿아 있으므로
  윤곽을 따라 얇고 균일한 접지 그림자를 생성하세요.

wallet/detail: >
  지갑 디테일 촬영(로고, 내부, 카드슬롯 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 벨트 (belt)
# ══════════════════════════════════════
belt: >
  벨트 제품입니다. 바닥에 놓인 부분의 곡선을 따라 자연스러운 접지 그림자를 생성하세요.

belt/front: >
  벨트 정면 촬영입니다. 바닥에 놓인 벨트 곡선 전체를 따라 접지 그림자를 생성하세요.
  버클 부분은 두께가 있으므로 약간 더 진한 그림자가 자연스럽습니다.

belt/detail: >
  벨트 디테일 촬영(버클, 스티칭, 각인 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 선글라스 (sunglasses)
# ══════════════════════════════════════
sunglasses: >
  선글라스 제품입니다. 다리(temple)와 프레임이 바닥에 닿는 접지점을 따라 그림자를 생성하세요.
  렌즈 반사는 그림자가 아니므로 추가하지 마세요.

sunglasses/front: >
  선글라스 정면 촬영입니다. 프레임 하단과 다리(temple) 접지점을 따라
  그림자를 생성하세요. 렌즈 반사는 그림자가 아닙니다.

sunglasses/detail: >
  선글라스 디테일 촬영(로고, 힌지, 렌즈 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

sunglasses/side: >
  선글라스 측면 촬영입니다. 접힌 다리와 프레임이 바닥에 닿는 점을 따라
  자연스러운 그림자를 생성하세요.

# ══════════════════════════════════════
# 액세서리 (accessory)
# ══════════════════════════════════════
accessory: >
  액세서리 제품입니다. 작은 제품이므로 접지 그림자도 작고 미세하게 생성하세요.

accessory/front: >
  액세서리 정면 촬영입니다. 바닥에 닿는 접지면에 미세한 그림자를 생성하세요.

accessory/detail: >
  액세서리 디테일 촬영입니다. 제품 일부만 보이므로 그림자를 생성하지 마세요.

# ══════════════════════════════════════
# 스카프 (scarf)
# ══════════════════════════════════════
scarf: >
  스카프 제품입니다. 바닥에 놓인 스카프의 접힌 형태를 따라 부드러운 그림자를 생성하세요.

scarf/detail: >
  스카프 디테일 촬영(패턴, 소재, 태그 등)입니다.
  제품 일부만 보이므로 그림자를 생성하지 마세요.

scarf/top_down: >
  스카프를 펼쳐놓고 위에서 촬영한 플랫레이입니다.
  그림자가 거의 보이지 않으므로 생성하지 마세요.

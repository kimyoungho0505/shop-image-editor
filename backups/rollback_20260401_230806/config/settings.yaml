output:
  width: 1000
  height: 1000
  max_file_size_kb: 2024
  background_color:
  - 255
  - 255
  - 255
  default_jpeg_quality: 95
image:
  supported_formats:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .tiff
  - .webp
api:
  model: claude-opus-4-20250514
  max_tokens: 2048
  temperature: 0.1
providers:
  vision: gemini
  background_removal: removebg
  enhancement: claid
  shadow: sam_mobile
openai:
  model: gpt-4o
  max_tokens: 2048
  temperature: 0.1
gemini:
  model: gemini-2.5-flash
  max_tokens: 2048
  temperature: 0.1
shadow_extract:
  method: transplant
  opacity: 70
  threshold: 15
  blur: 10.0
  search_top: 10
  search_bottom: 150
  search_sides: 80
  mask_expand: 3.0
  distance_falloff: 100
removebg:
  size: auto
  type: product
opencv_enhance:
  full:
    hdr: 20
    sharpness: 15
    exposure: 0
    saturation: 0
    contrast: 0
  detail:
    hdr: 15
    sharpness: 10
    exposure: 0
    saturation: 0
    contrast: 0
  worn:
    hdr: 10
    sharpness: 5
    exposure: 0
    saturation: 0
    contrast: 0
  package:
    hdr: 20
    sharpness: 15
    exposure: 0
    saturation: 0
    contrast: 0
photoroom:
  full:
    removeBackground: true
    outputSize: originalImage
    padding: 0.05
    scaling: fit
    export.format: png
    shadow.mode: ai.soft
    shadow.opacity: 0.5
  detail_complex:
    removeBackground: true
    positioning: originalImage
    outputSize: originalImage
    padding: 0
    scaling: fit
    export.format: png
  package:
    removeBackground: true
    outputSize: originalImage
    padding: 0.08
    scaling: fit
    export.format: png
    shadow.mode: ai.soft
    shadow.opacity: 0.5
sam:
  model_variant: sam_vit_b (CPU)
  checkpoint: null
  mask_smoothing: true
auto_options:
  claid: ai_auto
  opencv: ai_auto
  photoroom: ai_auto
  shadow: ai_auto
claid:
  full:
    hdr: 20
    sharpness: 10
    exposure: 20
    saturation: 5
    contrast: 10
  detail:
    fit: canvas
    width: 1000
    height: 1000
    hdr: 15
    sharpness: 10
    background_color: '#FFFFFF'
  worn:
    fit: bounds
    width: 1000
    hdr: 10
    sharpness: 5
  package:
    hdr: 20
    sharpness: 15
gemini_shadow:
  ref_prompt: 위 이미지는 원본 제품 사진입니다. 원본에 있는 자연스러운 그림자의 방향, 농도, 부드러움을 참고하세요.
  main_prompt: 위 이미지는 배경이 제거된 누끼 이미지입니다. {mannequin_removal}이 누끼 이미지의 바닥에 자연스러운 접지
    그림자(ground shadow)를 추가해주세요. {has_original}제품 자체는 절대 변경하지 마세요. 배경은 깨끗한 흰색을 유지하세요.
    그림자는 제품 바로 아래에 부드럽게 퍼지는 형태로, 럭셔리 이커머스 제품 사진처럼 고급스럽게 만들어주세요. 누끼 이미지를 기반으로 결과를 출력하세요.
  orig_insert: 원본 사진의 그림자를 최대한 동일하게 재현해주세요.
  mannequin_prompt: '제품 하단에 보이는 마네킹/토르소/스탠드 잔여물을 완전히 제거하세요. 잘린 부분은 원래 의류의 자연스러운 마감선으로
    복원하세요. 마네킹이 있던 자리를 깨끗한 흰색 배경으로 채우세요. '
  mannequin_full_prompt: '위 이미지는 마네킹에 착용된 의류 원본 사진입니다. 다음 작업을 수행해주세요:

    1. 배경을 완전히 제거하고 깨끗한 흰색(#FFFFFF)으로 교체하세요.

    2. 마네킹/토르소/스탠드를 완전히 제거하세요.

    3. 마네킹 제거 후 의류의 자연스러운 마감선(밑단, 소매 등)을 복원하세요.

    4. 의류 하단에 자연스러운 접지 그림자를 추가하세요.

    의류 자체(색상, 질감, 로고, 지퍼 등)는 절대 변경하지 마세요. 럭셔리 이커머스 제품 사진처럼 고급스럽게 만들어주세요.'
  order: after_enhance
tts:
  provider: openai
  openai_model: tts-1-hd
  speed: 1.0
  voices:
    claude: alloy
    chatgpt: nova
    gemini: echo
    mc: shimmer

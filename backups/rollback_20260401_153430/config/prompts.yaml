# Claude Vision API 프롬프트 템플릿
analysis:
  system: |
    You are an expert product image classifier for the LUXBOY luxury e-commerce platform.
    Analyze the provided product image and return ONLY a JSON object with your classification.
    Do not include any text outside the JSON object.

  user_template: |
    Analyze this product image for e-commerce processing.
    If multiple images are provided, they are all from the same product batch. Use ALL images together to determine the product category more accurately. The FIRST image is the primary target for classification.

    Classification criteria:
    - image_type:
      - "full": The ENTIRE product is visible (full bag, full pair of shoes, full clothing item, etc.)
      - "detail": Close-up of a SPECIFIC PART of the product (logo engraving, buckle, texture, interior, sole, stitching, metal hardware, zipper, label, etc.)
      - "worn": Product being worn by a model or displayed on a mannequin
      - "package": Packaging elements (box, dust bag, certificate, tags, etc.)

    - background:
      - "clean": Solid/plain background (white, gray, studio backdrop)
      - "complex": Store, outdoor, props visible in background
      - "none": Extreme close-up with virtually no background visible

    - subject_position: Where the main subject is positioned in the frame

    Return this exact JSON structure:
    {{
      "image_type": "<full | detail | worn | package>",
      "category": "<bag | shoes | clothing | accessory | watch | jewelry | wallet | belt | scarf | hat | sunglasses | other>",
      "category_display": "<Korean display name for the category>",
      "background": "<clean | complex | none>",
      "subject_position": "<center | left | right | top | bottom>",
      "is_detail_cut": <boolean, true if image_type is "detail">,
      "detail_focus_area": <object or null. ONLY when is_detail_cut is true, provide the region that should be emphasized. Use normalized coordinates (0.0 to 1.0). Example: {{"x": 0.15, "y": 0.20, "width": 0.65, "height": 0.65}}. Set null when is_detail_cut is false.>,
      "needs_shadow": <boolean. true if the product would benefit from a ground/drop shadow for e-commerce display. IMPORTANT: If the camera is looking straight down at the product from above (top-down / bird's eye view), needs_shadow MUST be false — shadows look unnatural on top-down shots. Also set false for: flat-lay items, detail close-ups, worn/model shots. Only set true for side/front angle shots where the product sits on a surface.>,
      "shadow_direction": <string or null. ONLY when needs_shadow is true AND a visible shadow exists in the original image, indicate the direction where the shadow falls relative to the product. Use: "bottom", "bottom-left", "bottom-right", "left", "right". If no visible shadow in the original or needs_shadow is false, set null.>,
      "shadow_params": <object or null. ONLY when needs_shadow is true, recommend optimal shadow extraction parameters based on the ORIGINAL IMAGE's actual shadow appearance. Your goal is to reproduce the original shadow as faithfully as possible, preserving its natural gradient (gradation) from dark near the product to light farther away. Return null when needs_shadow is false.
        IMPORTANT: Carefully observe the original image's shadow - its spread, darkness, softness, and how it gradually fades away. The extracted shadow must look like the original, with smooth natural gradation preserved.
        Example: {{"search_bottom": 120, "search_top": 5, "search_sides": 50, "blur": 8.0, "opacity": 80, "threshold": 10, "mask_expand": 2.0, "distance_falloff": 60}}
        Parameter guide:
        - search_bottom (0-200): How far below the product to search for shadow. Match the original shadow extent. Shoes/bags typically 80-150.
        - search_top (0-50): How far above the product to search. Usually small (3-10).
        - search_sides (0-100): How far left/right to search. Match original shadow width (30-80).
        - blur (1-25): Shadow edge softness. CRITICAL for natural gradation. Soft diffused shadows → higher (10-20). Hard sharp shadows → lower (3-7). Most studio product shots have soft shadows (8-15).
        - opacity (30-100): Shadow overall darkness. Match the original. Faint shadows → 30-50. Moderate → 50-80. Strong → 80-100.
        - threshold (5-30): Min brightness difference to detect shadow. Light shadows → 5-10. Dark shadows → 15-25.
        - mask_expand (1-5): Product mask expansion for edge cleanup. Simple shapes → 1-2. Complex → 3-5.
        - distance_falloff (30-100): How far the shadow gradient extends, as % of product size. Small tight shadows → 30-40. Wide diffused shadows → 60-100. This controls the natural fade-out gradient from product to background.>,
      "has_human_hand": <boolean. true if any human hand or fingers are visible in the image (e.g., hand holding the product, fingers gripping a strap, hand opening a bag)>,
      "hand_region": <object or null. ONLY when has_human_hand is true, provide the bounding box of the hand area using normalized coordinates (0.0 to 1.0). Example: {{"x": 0.0, "y": 0.7, "width": 0.3, "height": 0.3}}. Set null when has_human_hand is false.>,
      "product_only_region": <object or null. ONLY when has_human_hand is true, provide the tight bounding box of the PRODUCT ONLY, completely excluding all human hands, fingers, and arms. The goal is to crop the image so the product appears as LARGE as possible while the hand is NOT visible at all. Use normalized coordinates (0.0 to 1.0). Example: {{"x": 0.1, "y": 0.0, "width": 0.8, "height": 0.9}}. Set null when has_human_hand is false.>,
      "enhance_params": {{
        "hdr": <integer 0-50. Recommended HDR/local contrast strength. Higher (20-40) for flat/dull lighting. Lower (5-15) for already well-lit studio shots. 0 if image has strong HDR already.>,
        "sharpness": <integer 0-30. Recommended sharpness. Higher (15-25) for soft/slightly blurry images. Lower (5-10) for already crisp images. 0 if very sharp.>,
        "exposure": <integer -30 to 30. Exposure correction. Positive to brighten underexposed images, negative to darken overexposed. 0 if exposure is good.>,
        "saturation": <integer -20 to 20. Saturation adjustment. Positive to boost muted colors, negative to tone down oversaturated. 0 if color balance is good.>,
        "contrast": <integer -20 to 20. Contrast adjustment. Positive for flat/low-contrast images, negative for overly contrasty. 0 if contrast is good.>
      }},
      "photoroom_params": <object or null. ONLY when image_type is "full" or "package" and needs_shadow is true, recommend Photoroom-specific settings. Otherwise null.
        Example: {{"shadow.opacity": 0.5, "padding": 0.05}}
        - shadow.opacity (0.0-1.0): Shadow darkness. Faint/subtle products → 0.3-0.5. Bold/heavy products → 0.5-0.8.
        - padding (0.0-0.15): Product padding ratio. Large products filling frame → 0.03-0.05. Small products with space → 0.08-0.12.>,
      "confidence": <float from 0 to 1>,
      "notes": "<brief description of what is shown in the image>"
    }}

    Be precise with your classification. Focus on accurately identifying the image type and background condition, as these determine the processing pipeline.

refinement:
  system: |
    You are an expert e-commerce product image quality evaluator for the LUXBOY platform.
    Compare the ORIGINAL product photo with the PROCESSED result and evaluate quality.
    Return ONLY a JSON object. Do not include any text outside the JSON.

  user_template: |
    Compare these two images:
    - Image 1 (FIRST): ORIGINAL product photo (as shot)
    - Image 2 (SECOND): PROCESSED result (background removed, shadow added, enhanced)

    Current processing parameters used:
    {current_params}

    Evaluate the PROCESSED result (Image 2) compared to the ORIGINAL (Image 1):

    Score each criterion (1-10 scale, 10=perfect):
    1. shadow_naturalness: Does the shadow in the result look like the original? Is the gradient smooth? Is the shadow extent and darkness similar?
    2. color_accuracy: Does the product color/tone match the original? No color shift or saturation change?
    3. detail_preservation: Are fine details (texture, stitching, logos) preserved? No blurring or artifacts?
    4. overall_quality: Would this look professional on a luxury e-commerce site?
    5. background_cleanliness: Is the white background clean? No stains, artifacts, or remnants from the original background?

    Return this exact JSON:
    {{
      "scores": {{
        "shadow_naturalness": <1-10>,
        "color_accuracy": <1-10>,
        "detail_preservation": <1-10>,
        "overall_quality": <1-10>,
        "background_cleanliness": <1-10>
      }},
      "average_score": <float, average of all scores>,
      "verdict": "<perfect | acceptable | needs_improvement>",
      "problems": ["<specific problem 1>", "<specific problem 2>", ...],
      "reasoning": "<brief explanation of main issues or why it's good>",
      "adjusted_params": {{
        "shadow_config": <object or null. ONLY include if shadow needs adjustment. Use same keys as current params: opacity, threshold, blur, search_top, search_bottom, search_sides, mask_expand, distance_falloff. Only include keys that need changing.>,
        "enhance_config": <object or null. ONLY include if enhancement needs adjustment. Keys: hdr, sharpness, exposure, saturation, contrast. Only include keys that need changing.>
      }}
    }}

    Verdict rules:
    - "perfect": ALL scores >= 9. No further processing needed.
    - "acceptable": ALL scores >= 7, no single score < 6. Can stop.
    - "needs_improvement": Any score < 7. MUST provide adjusted_params.

    IMPORTANT for adjusted_params:
    - Be specific and conservative. Change only what's needed.
    - For shadow issues: adjust opacity (higher=darker shadow), blur (higher=softer), search_bottom/sides (higher=wider search), mask_expand (lower=preserve contact shadow), distance_falloff (higher=wider gradient).
    - For color issues: adjust exposure, saturation, contrast in enhance_config.
    - For detail issues: reduce sharpness or hdr if over-processed, increase if soft.

deliberation:
  # ═══════════════════════════════════════════════
  # 6단계 회의 프로세스
  # 1단계: 의견 발의 (독립 평가)
  # 2단계: 상호 검토 (동의/반박)
  # 3단계: 문제점 인식 (공통 문제 정리)
  # 4단계: 해결방법 제시
  # 5단계: 해결방법 토론 (동의/반박 반복)
  # 6단계: 최종 결정
  # ═══════════════════════════════════════════════

  # ── 1단계: 각자 의견 발의 (독립 평가) ──
  phase1_system: |
    당신은 LUXBOY 럭셔리 이커머스 플랫폼의 제품 이미지 품질 전문 평가자입니다.
    다른 AI 패널과 함께 처리된 제품 이미지를 평가하는 회의에 참여합니다.
    먼저 독립적으로 이미지를 분석하고 솔직한 의견을 제시하세요.
    대화하듯 자연스러운 한국어로 답변하세요. JSON만 반환하세요.

  phase1_user: |
    [회의 1단계: 의견 발의]

    이커머스 제품 이미지 처리 결과를 평가합니다.
    - 이미지 1 (첫번째): 원본 제품 사진
    - 이미지 2 (두번째): 처리 결과 (배경제거 + 그림자 + 보정)

    현재 처리에 사용된 파라미터:
    {current_params}

    그림자 처리 참고사항:
    - "원본이식(transplant)" 모드: 원본 배경의 밝기 차이(255-(bg-pixel))로 그림자를 추출합니다.
      목표는 원본 그림자의 명도, 대비, 투명도, 자연스러운 그라데이션을 최대한 보존하는 것입니다.
      처리 후 그림자가 흐려지거나 원본과 다르면 심각한 문제입니다.

    각 항목을 1~10점으로 평가하고 의견을 말해주세요:
    1. shadow_naturalness: 그림자가 원본과 동일하게 자연스러운가? (명도/대비/투명도 보존)
    2. color_accuracy: 제품 색감이 원본과 동일한가?
    3. detail_preservation: 세밀한 디테일(질감, 로고, 스티칭)이 보존되었나?
    4. overall_quality: 럭셔리 이커머스에 적합한 전문적 품질인가?
    5. background_cleanliness: 흰 배경이 깨끗한가?

    JSON 형식:
    {{
      "evaluator": "<모델명>",
      "speech": "<다른 패널에게 하는 자연스러운 발언. 예: '안녕하세요, 제가 보기에 이 이미지는...' 형태로 2~4문장>",
      "scores": {{
        "shadow_naturalness": <1-10>,
        "color_accuracy": <1-10>,
        "detail_preservation": <1-10>,
        "overall_quality": <1-10>,
        "background_cleanliness": <1-10>
      }},
      "average_score": <float>,
      "verdict": "<perfect | acceptable | needs_improvement>",
      "problems": ["<문제1>", ...],
      "fix_type": "<param_only | code_needed | both>",
      "reasoning": "<상세 분석>"
    }}

  # ── 2단계: 상호 검토 — 동의/반박 ──
  phase2_system: |
    당신은 AI 전문가 패널의 일원입니다. 다른 패널원들의 초기 의견을 검토합니다.
    동의하는 부분, 반박하는 부분을 명확히 밝히고 근거를 설명하세요.
    마치 회의에서 직접 대화하듯이 자연스럽게 한국어로 답변하세요.
    상대방 이름을 불러가며 의견을 주고받는 형태로 작성하세요.
    JSON만 반환하세요.

  phase2_user: |
    [회의 2단계: 상호 검토]

    패널원들의 초기 의견입니다:
    {all_evaluations}

    다른 패널원들의 의견을 검토하고 대화하듯 응답하세요:
    - 동의하는 점은 구체적으로 어떤 부분에 동의하는지
    - 반박하는 점은 왜 다르게 생각하는지 근거를 들어서
    - 예: "Claude님 의견에 동의합니다. 그림자 부분은..." 또는 "Gemini님 점수는 좀 후하다고 봅니다. 실제로 보면..."

    {{
      "evaluator": "<모델명>",
      "speech": "<다른 패널에게 하는 대화체 발언. 상대방 이름 언급하며 동의/반박. 3~5문장>",
      "agreements": ["<동의하는 의견과 이유>", ...],
      "rebuttals": ["<반박하는 의견과 근거>", ...],
      "updated_scores": {{
        "shadow_naturalness": <1-10>,
        "color_accuracy": <1-10>,
        "detail_preservation": <1-10>,
        "overall_quality": <1-10>,
        "background_cleanliness": <1-10>
      }},
      "average_score": <float>,
      "consensus_on_scores": <boolean, 점수에 대체로 합의했다고 보는지>
    }}

  # ── 3단계: 문제점 인식 (공통 문제 정리) ──
  phase3_system: |
    당신은 AI 패널 회의의 진행자입니다. 2단계 토론 결과를 바탕으로
    모든 패널원이 동의하는 공통 문제점을 정리합니다.
    한국어로 작성하세요. JSON만 반환하세요.

  phase3_user: |
    [회의 3단계: 문제점 인식]

    2단계까지의 토론 내용:
    {all_evaluations}

    토론 결과를 종합하여:
    1. 모든 패널원이 동의하는 공통 문제점을 정리
    2. 의견이 갈리는 쟁점 사항을 정리
    3. 각 문제의 심각도(critical/major/minor)를 판단

    대화하듯 정리해주세요. 예: "지금까지 논의를 정리하면..."

    {{
      "evaluator": "<모델명>",
      "speech": "<회의 정리 발언. '지금까지 논의를 정리해보겠습니다...' 형태로 3~5문장>",
      "agreed_problems": [
        {{"description": "<공통 인식 문제>", "severity": "<critical|major|minor>", "agreed_by": ["claude", "chatgpt", "gemini"]}}
      ],
      "disputed_points": [
        {{"topic": "<쟁점>", "positions": {{"claude": "<입장>", "chatgpt": "<입장>", "gemini": "<입장>"}}}}
      ],
      "consolidated_scores": {{
        "shadow_naturalness": <중앙값>,
        "color_accuracy": <중앙값>,
        "detail_preservation": <중앙값>,
        "overall_quality": <중앙값>,
        "background_cleanliness": <중앙값>
      }},
      "average_score": <float>
    }}

  # ── 4단계: 각자 해결방법 제시 ──
  phase4_system: |
    당신은 AI 전문가 패널의 일원입니다. 3단계에서 정리된 문제점에 대해
    구체적인 해결 방법을 제시합니다.
    해결 방법은 두 가지로 나누세요:
    A) 파라미터(옵션값) 수정으로 해결 가능한 것
    B) 코드 변경이 필요한 것
    한국어 대화체로 작성하세요. JSON만 반환하세요.

  phase4_user: |
    [회의 4단계: 해결방법 제시]

    정리된 문제점:
    {problem_summary}

    {deep_explore_instruction}

    각 문제에 대한 구체적 해결 방법을 제시하세요.
    다른 패널에게 설명하듯이 자연스럽게 발언하세요.

    {{
      "evaluator": "<모델명>",
      "speech": "<해결방법 제안 발언. '제가 생각하는 해결 방법은...' 형태로 3~6문장>",
      "param_fixes": [
        {{"problem": "<어떤 문제>", "fix": "<파라미터 변경 내용>", "params": {{"shadow_config": {{}}, "enhance_config": {{}}}} }}
      ],
      "code_fixes": [
        {{
          "problem": "<어떤 문제>",
          "severity": "<critical|major|minor>",
          "description": "<코드에서 무엇이 잘못되었는지>",
          "suggested_fix": "<구체적 수정 방법>",
          "code_snippet": "<수정될 코드 예시 (선택)>"
        }}
      ],
      "novel_approaches": ["<기존 방식과 다른 창의적 접근법 제안>", ...]
    }}

  # ── 5단계: 해결방법 토론 (동의/반박 반복) ──
  phase5_system: |
    당신은 AI 전문가 패널의 일원입니다. 다른 패널원들이 제시한 해결 방법을 검토합니다.
    각 해결 방법에 대해 동의/반박하고, 더 나은 방법이 있다면 제시하세요.
    실제 회의처럼 상대방 이름을 부르며 대화하세요.
    한국어 대화체로 작성하세요. JSON만 반환하세요.

  phase5_user: |
    [회의 5단계: 해결방법 토론 — {round_num}차]

    제시된 해결 방법들:
    {all_solutions}

    각 해결 방법에 대해 동의/반박하세요:
    - "ChatGPT님이 제안한 blur 값 조정은 동의합니다만, 수치는..."
    - "Gemini님의 코드 수정 방향은 좋지만, 부작용이..."
    동의하는 방법끼리 모아서 최종 추천안을 구성해주세요.

    {{
      "evaluator": "<모델명>",
      "speech": "<해결방법에 대한 토론 발언. 상대방 이름 언급하며 4~6문장>",
      "fix_agreements": ["<동의하는 해결 방법과 이유>", ...],
      "fix_rebuttals": ["<반박하는 해결 방법과 대안>", ...],
      "recommended_params": {{
        "shadow_config": <object or null>,
        "enhance_config": <object or null>
      }},
      "recommended_code_fixes": [
        {{
          "severity": "<critical|major|minor>",
          "description": "<문제>",
          "suggested_fix": "<합의된 수정 방법>"
        }}
      ],
      "consensus_reached": <boolean, 해결 방법에 대체로 합의했는지>
    }}

  # ── 5단계 심화: 5회 이상 반복 시 폭넓은 탐색 ──
  deep_explore_instruction: |
    [심화 탐색 모드]
    기존 방법으로 5회 이상 수정을 반복했지만 충분한 개선이 이루어지지 않았습니다.
    이제 기존 접근법에서 벗어나 더 폭넓게 해결 방법을 탐색해주세요:

    1. 완전히 다른 알고리즘적 접근 (예: 기존 픽셀 연산 대신 주파수 도메인 처리, 가우시안 혼합 모델 등)
    2. 학술 논문이나 오픈소스 프로젝트에서 영감을 받은 방법 (직접 구현 가능한 수준으로)
    3. 여러 기법의 창의적 조합 (예: 마스크 후처리 + 색공간 변환 + 적응형 블렌딩)
    4. 문제의 근본 원인을 재분석 — 혹시 전제 자체가 잘못된 것은 아닌지?
    5. 일반적이지 않지만 응용 가능한 기법 (게임 그래픽, 의료 영상, 위성 이미지 처리 등에서 차용)

    기존에 시도한 방법과 명확히 차별되는 새로운 아이디어를 반드시 1개 이상 포함하세요.

